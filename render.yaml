# render.yaml — Render.com deployment config for RevIndex backend
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: revindex-api
    runtime: node
    rootDir: server
    buildCommand: npm ci
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 5000
      - key: CLIENT_ORIGIN
        sync: false   # Set this manually in Render dashboard to your Vercel URL
    healthCheckPath: /
